name: End-to-end CI

on:
  push:
  pull_request:

jobs:
  end_to_end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ nlohmann-json3-dev

      - name: Generate blueprint (C#)
        run: |
          echo "--> Generating enterprise_blueprint.json via Forge/Forge.csproj"
          dotnet run --project Forge/Forge.csproj

      - name: Show generated blueprint
        run: |
          echo "---- enterprise_blueprint.json ----"
          cat enterprise_blueprint.json
          echo "----------------------------------"

      - name: Build C++ runtime
        run: |
          echo "--> Building PriceBlueprint (g++)"
          g++ -std=c++17 PriceBlueprint/src/main.cpp -IPriceBlueprint/include -o price_blueprint

      - name: Run price_blueprint and capture output
        run: |
          chmod +x ./price_blueprint || true
          ./price_blueprint | tee price_blueprint.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: price_blueprint_log
          path: price_blueprint.log
